<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>deobfuscation blog</title>
        
        <!-- Theme check script (prevents flashing) -->
        <script>
            (function() {
                const theme = localStorage.getItem('theme') || 'dark';
                if (theme === 'dark') {
                    document.documentElement.setAttribute('data-theme', 'dark');
                }
            })();
        </script>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
        
        <style>
            :root {
                --bg-color: #f8fafc;
                --card-bg: #ffffff;
                --text-color: #334155;
                --accent-color: #0ea5e9; /* vibrant sky blue */
                --secondary-text: #64748b;
                --border-color: #e2e8f0;
                --hover-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
                --transition-speed: 0.2s;
            }

            [data-theme="dark"] {
                --bg-color: #121212; /* softened black */
                --card-bg: #1e1e1e;
                --text-color: #e2e8f0;
                --accent-color: #38bdf8; /* brighter sky blue for dark mode */
                --secondary-text: #94a3b8;
                --border-color: #2d2d2d;
                --hover-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.5);
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                text-transform: lowercase; /* global lowercase aesthetic */
            }

            body {
                background-color: var(--bg-color);
                color: var(--text-color);
                font-family: 'Montserrat', sans-serif;
                line-height: 1.5;
                transition: background-color var(--transition-speed);
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 3rem 1.5rem;
            }

            .container {
                width: 100%;
                max-width: 580px; /* more compact */
            }

            header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 3rem;
            }

            h1 {
                font-size: 1.1rem;
                font-weight: 600;
                letter-spacing: -0.01em;
            }

            #theme-toggle {
                background: var(--card-bg);
                border: 1px solid var(--border-color);
                color: var(--text-color);
                padding: 0.4rem 0.8rem;
                cursor: pointer;
                font-family: inherit;
                font-size: 0.75rem;
                border-radius: 6px;
                transition: all var(--transition-speed);
            }

            #theme-toggle:hover {
                border-color: var(--accent-color);
                color: var(--accent-color);
            }

            .blog-grid {
                display: flex;
                flex-direction: column;
                gap: 1.25rem;
            }

            .blog-entry {
                background: var(--card-bg);
                border: 1px solid var(--border-color);
                padding: 1.5rem;
                border-radius: 10px;
                text-decoration: none;
                color: inherit;
                display: block;
                transition: transform var(--transition-speed), border-color var(--transition-speed), box-shadow var(--transition-speed);
            }

            .blog-entry:hover {
                transform: translateY(-2px);
                border-color: var(--accent-color);
                box-shadow: var(--hover-shadow);
            }

            .entry-date {
                font-size: 0.7rem;
                color: var(--secondary-text);
                margin-bottom: 0.5rem;
                display: block;
                font-weight: 300;
            }

            .entry-title {
                font-size: 1.15rem;
                font-weight: 600;
                margin-bottom: 0.5rem;
                color: var(--text-color);
                transition: color var(--transition-speed);
            }

            .blog-entry:hover .entry-title {
                color: var(--accent-color);
            }

            .entry-excerpt {
                font-size: 0.85rem;
                color: var(--secondary-text);
                font-weight: 400;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <header>
                <h1>deobfuscation blog</h1>
                <button id="theme-toggle">toggle theme</button>
            </header>

            <main id="blog-posts" class="blog-grid">
                <!-- posts injected via js -->
            </main>
        </div>

        <script>
            // modular entries
            const blogData = [
                {
                    title: "analyzing control flow flattening",
                    date: "may 05, 2026",
                    excerpt: "reconstructing switch-case logic from mutated bytecode structures.",
                    link: "#"
                },
                {
                    title: "automating constant decryption",
                    date: "april 28, 2026",
                    excerpt: "extracting string pools protected by xor-based dynamic keys.",
                    link: "#"
                },
                {
                    title: "the role of upvalues",
                    date: "april 15, 2026",
                    excerpt: "mapping function hierarchy through closure state analysis.",
                    link: "#"
                }
            ];

            const postsContainer = document.getElementById('blog-posts');

            function renderPosts() {
                postsContainer.innerHTML = blogData.map(post => `
                    <a href="${post.link}" class="blog-entry">
                        <span class="entry-date">${post.date}</span>
                        <div class="entry-title">${post.title}</div>
                        <p class="entry-excerpt">${post.excerpt}</p>
                    </a>
                `).join('');
            }

            const toggleBtn = document.getElementById('theme-toggle');

            toggleBtn.addEventListener('click', () => {
                const isDark = document.documentElement.hasAttribute('data-theme');
                if (isDark) {
                    document.documentElement.removeAttribute('data-theme');
                    localStorage.setItem('theme', 'light');
                } else {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    localStorage.setItem('theme', 'dark');
                }
            });

            renderPosts();
        </script>
    </body>
</html>
