<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>deobfuscation blog</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
        
        <style>
            :root {
                --bg-color: #ffffff;
                --text-color: #1a1a1a;
                --accent-color: #6d28d9;
                --secondary-text: #666666;
                --border-color: #eeeeee;
                --transition-speed: 0.3s;
            }

            [data-theme="dark"] {
                --bg-color: #050505; /* Deep black for OLED */
                --text-color: #e5e5e5;
                --accent-color: #a855f7; /* High contrast purple */
                --secondary-text: #a1a1aa;
                --border-color: #1f1f23;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background-color: var(--bg-color);
                color: var(--text-color);
                font-family: 'Montserrat', sans-serif;
                line-height: 1.6;
                transition: background-color var(--transition-speed), color var(--transition-speed);
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 2rem 1rem;
            }

            .container {
                width: 100%;
                max-width: 650px;
            }

            header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 4rem;
                border-bottom: 1px solid var(--border-color);
                padding-bottom: 1rem;
            }

            h1 {
                font-size: 1.2rem;
                font-weight: 600;
                letter-spacing: -0.02em;
            }

            #theme-toggle {
                background: none;
                border: 1px solid var(--border-color);
                color: var(--text-color);
                padding: 0.4rem 0.8rem;
                cursor: pointer;
                font-family: inherit;
                font-size: 0.8rem;
                border-radius: 4px;
                transition: border-color var(--transition-speed);
            }

            #theme-toggle:hover {
                border-color: var(--accent-color);
            }

            .blog-entry {
                margin-bottom: 3rem;
            }

            .entry-date {
                font-size: 0.75rem;
                color: var(--secondary-text);
                text-transform: uppercase;
                letter-spacing: 0.1em;
                margin-bottom: 0.5rem;
            }

            .entry-title {
                font-size: 1.5rem;
                font-weight: 600;
                margin-bottom: 0.75rem;
                color: var(--accent-color);
                text-decoration: none;
                display: block;
            }

            .entry-excerpt {
                font-size: 0.95rem;
                color: var(--secondary-text);
                font-weight: 300;
            }

            footer {
                margin-top: 4rem;
                font-size: 0.8rem;
                color: var(--secondary-text);
                text-align: center;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <header>
                <h1>deobfuscation log</h1>
                <button id="theme-toggle" aria-label="Toggle dark mode">toggle theme</button>
            </header>

            <main id="blog-posts">
                <!-- Posts will be injected here via JavaScript -->
            </main>

            <footer>
                <p>&copy; 2026 / modular deobfuscation blog</p>
            </footer>
        </div>

        <script>
            // Modular Blog Entries
            const blogData = [
                {
                    title: "Analyzing Control Flow Flattening in Luau",
                    date: "May 05, 2026",
                    excerpt: "A deep dive into reconstructing the original switch-case logic from heavily mutated bytecode structures.",
                    link: "#"
                },
                {
                    title: "Automating Constant Decryption",
                    date: "April 28, 2026",
                    excerpt: "Using static analysis to extract and decrypt string pools protected by XOR-based dynamic keys.",
                    link: "#"
                },
                {
                    title: "The Role of Upvalues in Script Reconstruction",
                    date: "April 15, 2026",
                    excerpt: "Understanding how closure state can be used to map out the function hierarchy of an obfuscated script.",
                    link: "#"
                }
            ];

            const postsContainer = document.getElementById('blog-posts');

            // Render Function
            function renderPosts() {
                postsContainer.innerHTML = blogData.map(post => `
                    <article class="blog-entry">
                        <div class="entry-date">${post.date}</div>
                        <a href="${post.link}" class="entry-title">${post.title}</a>
                        <p class="entry-excerpt">${post.excerpt}</p>
                    </article>
                `).join('');
            }

            // Theme Toggle Logic
            const toggleBtn = document.getElementById('theme-toggle');
            const currentTheme = localStorage.getItem('theme') || 'dark';

            if (currentTheme === 'dark') {
                document.body.setAttribute('data-theme', 'dark');
            }

            toggleBtn.addEventListener('click', () => {
                let theme = document.body.getAttribute('data-theme');
                if (theme === 'dark') {
                    document.body.removeAttribute('data-theme');
                    localStorage.setItem('theme', 'light');
                } else {
                    document.body.setAttribute('data-theme', 'dark');
                    localStorage.setItem('theme', 'dark');
                }
            });

            // Initialize
            renderPosts();
        </script>
    </body>
</html>
